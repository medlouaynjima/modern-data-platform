name: modern-data-platform

services:
  postgres:
    image: postgres:16-alpine
    container_name: mdp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-warehouse}
      POSTGRES_USER: ${POSTGRES_USER:-mdp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mdp_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: mdp-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-bootstrap:
    image: minio/mc:latest
    container_name: mdp-minio-bootstrap
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MDP_BUCKET: ${MDP_BUCKET:-lakehouse}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing local/$${MDP_BUCKET};
      mc anonymous set none local/$${MDP_BUCKET};
      "
    restart: "no"

  kafka:
    image: apache/kafka:3.7.0
    container_name: mdp-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    ports:
      - "${KAFKA_EXTERNAL_PORT:-29092}:29092"
    volumes:
      - kafka_data:/tmp/kraft-combined-logs
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10

  kafka-init:
    image: apache/kafka:3.7.0
    container_name: mdp-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - /bin/bash
      - -ec
      - |
        for topic in customers products orders payments clicks inventory; do
          /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 \
            --create --if-not-exists \
            --topic "$$topic" \
            --partitions 3 \
            --replication-factor 1
        done
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list
    restart: "no"

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: mdp-kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      DYNAMIC_CONFIG_ENABLED: "false"
    ports:
      - "${KAFKA_UI_PORT:-8081}:8080"

  producer:
    build:
      context: .
      dockerfile: producer/Dockerfile
    container_name: mdp-producer
    profiles: ["producers"]
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    command:
      - --bootstrap-server
      - kafka:9092
      - --events
      - "${PRODUCER_EVENTS:-100}"
      - --rate
      - "${PRODUCER_RATE:-20}"
    restart: "no"

  spark-bronze:
    build:
      context: .
      dockerfile: spark/Dockerfile
    container_name: mdp-spark-bronze
    profiles: ["spark"]
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    command:
      - --packages
      - io.delta:delta-spark_2.12:3.2.0,org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.1
      - --conf
      - spark.sql.extensions=io.delta.sql.DeltaSparkSessionExtension
      - --conf
      - spark.sql.catalog.spark_catalog=org.apache.spark.sql.delta.catalog.DeltaCatalog
      - /opt/spark/work-dir/spark/bronze_stream.py
      - --bootstrap-server
      - kafka:9092
      - --bronze-path
      - /opt/spark/work-dir/data/bronze/events
      - --checkpoint-path
      - /opt/spark/work-dir/data/bronze/_checkpoints/events
    volumes:
      - ${MDP_PROJECT_DIR:-.}/data:/opt/spark/work-dir/data
    restart: "no"

  spark-silver:
    build:
      context: .
      dockerfile: spark/Dockerfile
    container_name: mdp-spark-silver
    profiles: ["spark"]
    command:
      - --packages
      - io.delta:delta-spark_2.12:3.2.0
      - --conf
      - spark.sql.extensions=io.delta.sql.DeltaSparkSessionExtension
      - --conf
      - spark.sql.catalog.spark_catalog=org.apache.spark.sql.delta.catalog.DeltaCatalog
      - /opt/spark/work-dir/spark/silver_transform.py
      - --bronze-path
      - /opt/spark/work-dir/data/bronze/events
      - --silver-path
      - /opt/spark/work-dir/data/silver
    volumes:
      - ${MDP_PROJECT_DIR:-.}/data:/opt/spark/work-dir/data
    restart: "no"

  spark-thrift:
    build:
      context: .
      dockerfile: spark/Dockerfile
    container_name: mdp-spark-thrift
    profiles: ["dbt", "airflow"]
    entrypoint:
      - /bin/bash
      - -lc
    command:
      - >
        /opt/spark/sbin/start-thriftserver.sh
        --master local[*]
        --conf spark.sql.extensions=io.delta.sql.DeltaSparkSessionExtension
        --conf spark.sql.catalog.spark_catalog=org.apache.spark.sql.delta.catalog.DeltaCatalog
        --conf spark.sql.warehouse.dir=/opt/spark/work-dir/data/gold
        --conf spark.sql.shuffle.partitions=6
        && tail -f /dev/null
    ports:
      - "${SPARK_THRIFT_PORT:-10000}:10000"
    volumes:
      - ${MDP_PROJECT_DIR:-.}/data:/opt/spark/work-dir/data
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/10000'"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  dbt:
    build:
      context: .
      dockerfile: dbt/Dockerfile
    container_name: mdp-dbt
    profiles: ["dbt"]
    depends_on:
      spark-thrift:
        condition: service_healthy
    working_dir: /usr/app/dbt
    command:
      - build
      - --profiles-dir
      - /usr/app/dbt
      - --project-dir
      - /usr/app/dbt
    volumes:
      - ${MDP_PROJECT_DIR:-.}/dbt:/usr/app/dbt
      - ${MDP_PROJECT_DIR:-.}/data:/opt/spark/work-dir/data
    restart: "no"

  airflow-init:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    container_name: mdp-airflow-init
    profiles: ["airflow"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-mdp}:${POSTGRES_PASSWORD:-mdp_password}@postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-46BKJoQYlPPOexR0G8meJIP9bDVSchH4VrE9F7Yb4Lc=}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_USERNAME:-admin}
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_PASSWORD:-admin}
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username "$${_AIRFLOW_WWW_USER_USERNAME}" \
          --password "$${_AIRFLOW_WWW_USER_PASSWORD}" \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com || true
    restart: "no"

  airflow-webserver:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    container_name: mdp-airflow-webserver
    profiles: ["airflow"]
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      spark-thrift:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-mdp}:${POSTGRES_PASSWORD:-mdp_password}@postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-46BKJoQYlPPOexR0G8meJIP9bDVSchH4VrE9F7Yb4Lc=}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      PRODUCER_EVENTS: ${PRODUCER_EVENTS:-100}
      PRODUCER_RATE: ${PRODUCER_RATE:-20}
      MDP_PROJECT_DIR: ${MDP_PROJECT_DIR:-.}
    command: webserver
    ports:
      - "${AIRFLOW_PORT:-8080}:8080"
    volumes:
      - ./:/opt/airflow/project
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  airflow-scheduler:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    container_name: mdp-airflow-scheduler
    profiles: ["airflow"]
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      spark-thrift:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-mdp}:${POSTGRES_PASSWORD:-mdp_password}@postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-46BKJoQYlPPOexR0G8meJIP9bDVSchH4VrE9F7Yb4Lc=}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      PRODUCER_EVENTS: ${PRODUCER_EVENTS:-100}
      PRODUCER_RATE: ${PRODUCER_RATE:-20}
      MDP_PROJECT_DIR: ${MDP_PROJECT_DIR:-.}
    command: scheduler
    volumes:
      - ./:/opt/airflow/project
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
  kafka_data:
