version: 2

models:
  - name: stg_customers
    description: Typed customer profile events from the Silver layer.
    columns:
      - name: event_id
        tests:
          - not_null
          - unique
      - name: customer_id
        tests:
          - not_null
      - name: loyalty_tier
        tests:
          - accepted_values:
              values: ["bronze", "silver", "gold", "platinum"]

  - name: stg_products
    description: Typed product catalog events from the Silver layer.
    columns:
      - name: event_id
        tests:
          - not_null
          - unique
      - name: product_id
        tests:
          - not_null
      - name: price
        tests:
          - not_null

  - name: stg_orders
    description: Typed order events from the Silver layer.
    columns:
      - name: event_id
        tests:
          - not_null
          - unique
      - name: order_id
        tests:
          - not_null
      - name: customer_id
        tests:
          - not_null
      - name: product_id
        tests:
          - not_null
      - name: total_amount
        tests:
          - not_null

  - name: stg_payments
    description: Typed payment events from the Silver layer.
    columns:
      - name: event_id
        tests:
          - not_null
          - unique
      - name: payment_id
        tests:
          - not_null
      - name: payment_status
        tests:
          - accepted_values:
              values: ["authorized", "declined", "refunded"]

  - name: stg_clicks
    description: Typed clickstream events from the Silver layer.
    columns:
      - name: event_id
        tests:
          - not_null
          - unique
      - name: session_id
        tests:
          - not_null
      - name: event_type
        tests:
          - accepted_values:
              values: ["page_view", "search", "add_to_cart", "remove_from_cart", "checkout_start"]

  - name: stg_inventory
    description: Typed inventory events from the Silver layer.
    columns:
      - name: event_id
        tests:
          - not_null
          - unique
      - name: inventory_event_id
        tests:
          - not_null
      - name: product_id
        tests:
          - not_null
