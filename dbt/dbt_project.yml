name: modern_data_platform
version: "1.0.0"
config-version: 2

profile: modern_data_platform

model-paths: ["models"]
macro-paths: ["macros"]
test-paths: ["tests"]
target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

vars:
  silver_path: "/opt/spark/work-dir/data/silver"
  gold_path: "/opt/spark/work-dir/data/gold"

models:
  modern_data_platform:
    staging:
      +materialized: view
      +schema: silver
    intermediate:
      +materialized: view
      +schema: gold
    marts:
      +materialized: table
      +schema: gold
      +file_format: delta
